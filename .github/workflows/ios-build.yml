name: Build iOS IPA
on:
  push:
    branches: [ master, main, maestro ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Give execute permission to gradlew
        run: chmod +x gradlew

      - name: Build KMP Shared Framework
        run: ./gradlew :shared:assembleRelease

      - name: Info for iOS Build
        run: |
          echo "El proyecto de iOS requiere ser abierto una vez en Xcode (Mac) para generar los archivos .xcodeproj necesarios."
          echo "La parte lógica (Kotlin Shared) se ha compilado correctamente."
