name: Build iOS IPA
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Give execute permission to gradlew
        run: chmod +x gradlew

      - name: Build KMP Shared Framework
        run: ./gradlew :shared:assembleRelease

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd iosApp && pod install

      - name: Build iOS App (.app)
        run: |
          xcodebuild -workspace iosApp/iosApp.xcworkspace \
                     -scheme iosApp \
                     -sdk iphoneos \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Create Payload and ZIP to IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/iosApp.app Payload/
          zip -r TeamParking.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamParking-iOS-IPA
          path: TeamParking.ipa
